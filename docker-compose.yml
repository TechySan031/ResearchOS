##################################################
# ResearchOS — Development Infrastructure
##################################################

services:
  # ---- Redis (Cache + Pub/Sub + Rate Limiting) ----
  redis:
    image: redis:7-alpine
    container_name: researchos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---- PostgreSQL (Production DB — optional for dev) ----
  postgres:
    image: postgres:16-alpine
    container_name: researchos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: researchos
      POSTGRES_USER: researchos
      POSTGRES_PASSWORD: researchos_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchos"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  redis_data:
  postgres_data:
