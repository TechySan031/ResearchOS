# Alembic configuration for ResearchOS backend
#
# The sqlalchemy.url below is a placeholder. The actual connection URL is
# injected at runtime by alembic/env.py from app.config.get_settings().

[alembic]
# Path to the Alembic migration environment
script_location = alembic

# Placeholder – overridden in env.py at runtime
sqlalchemy.url = sqlite+aiosqlite:///./researchos.db

# Template used to generate migration file names.
# Uses rev_id so filenames look like: 001_initial_schema_<revid>.py
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the migration date (UTC recommended).
# Requires the python-dateutil library.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .hierarchical revisions for in-development branches.
# sourceless = false

# Version path separator; default is "os" which uses os.pathsep.
# version_path_separator = os

# Output encoding used when writing revision scripts.
output_encoding = utf-8


[post_write_hooks]
# Uncomment and configure to run formatters after generating migrations.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# ── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
